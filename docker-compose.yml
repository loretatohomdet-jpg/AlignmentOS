# Local PostgreSQL for AlignmentOS (Prisma)
# Usage: docker compose up -d
# Then set DATABASE_URL in backend/.env to match POSTGRES_* below.

services:
  postgres:
    image: postgres:16-alpine
    container_name: alignmentos-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: alignment
      POSTGRES_PASSWORD: alignment
      POSTGRES_DB: alignment_index_db
    volumes:
      - alignmentos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U alignment -d alignment_index_db']
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  alignmentos_pgdata:
